apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: devboard-app
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing        # ALB gets ENIs in the public subnets
    alb.ingress.kubernetes.io/target-type: ip                # route straight to pod IPs, not node ports
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # Subnets are auto-discovered from the kubernetes.io/role/elb tags set in Terraform.
    # Add alb.ingress.kubernetes.io/certificate-arn and a 443 listener once you have an ACM cert.
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
                  