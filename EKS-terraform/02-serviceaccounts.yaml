apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-frontend-sa
  namespace: three-tier-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: go-api-sa
  namespace: three-tier-app
  annotations:
    # Only needed if the Go service talks to other AWS services directly
    # (e.g. Secrets Manager, S3). Role must be created in Terraform via
    # the iam-role-for-service-accounts-eks module (IRSA), then referenced here.
    eks.amazonaws.com/role-arn: "arn:aws:iam::<ACCOUNT_ID>:role/go-api-irsa-role"