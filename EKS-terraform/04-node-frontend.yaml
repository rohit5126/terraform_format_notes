apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: devboard-app
  labels:
    apps: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      apps: frontend
  template:
    metadata:
      labels:
        apps: frontend
        tier: web
    spec:
      serviceAccountName: node-frontend-sa
      containers:
        - name: frontend-devboard
          image: rohit5126/devboard-frontend:latest
          ports:
            - containerPort: 4173
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: devboard-app
  labels:
    apps: frontend
spec:
  type: ClusterIP        # the ALB targets this via the Ingress below, not a LoadBalancer Service
  selector:
    apps: frontend
  ports:
    - port: 80
      targetPort: 4173
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: devboard-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70