# OPTIONAL: only apply this if you are NOT using RDS (see Terraform aws_db_instance).
# Running Postgres in-cluster means it's tied to whichever AZ its EBS volume lands in,
# and you own backups/patching/failover yourself. RDS is recommended for real workloads.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: devboard-app
spec:
  clusterIP: None          # headless - StatefulSet pods get stable DNS names
  selector:
    apps: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    apps: postgres
  namespace: devboard-app
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      apps: postgres
  template:
    metadata:
      labels:
        apps: postgres
        tier: data
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pg-sec
                  key: POSTGRES_DB
          volumeMounts:
            - name: init 
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true 
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres-data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["sh","-c", "pg_isready -U $(POSTGRES_USER) -d $(POSTGRES_DB)"]
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: pg-config

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi