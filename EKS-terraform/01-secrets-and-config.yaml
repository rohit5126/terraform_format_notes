# In real usage, do NOT commit real secrets to git or apply this file as-is.
# Prefer syncing from AWS Secrets Manager via the External Secrets Operator,
# or at minimum create this with `kubectl create secret generic ...` from CLI
# so the value never lands in a file/state that gets committed.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: three-tier-app
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: "REPLACE_ME"       # inject via CI/CD or External Secrets in practice
  POSTGRES_DB: appdb
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: three-tier-app
data:
  # If using RDS: point this at the RDS endpoint (private DNS name from Terraform output).
  # If using in-cluster Postgres (05-postgres-statefulset.yaml): use the headless service name below.
  POSTGRES_HOST: "postgres.three-tier-app.svc.cluster.local"   # or: app-postgres.xxxxx.ap-south-1.rds.amazonaws.com
  POSTGRES_PORT: "5432"
  GO_API_URL: "http://go-api.three-tier-app.svc.cluster.local"
  GO_API_PORT: "8080"
  NODE_PORT: "3000"